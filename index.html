<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dice-background">
        <img src="dice_images/dice1.png">
        <img src="dice_images/dice2.png">
        <img src="dice_images/dice3.png">
        <img src="dice_images/dice4.png">
        <img src="dice_images/dice5.png">
        <img src="dice_images/dice6.png">
    </div>

    <div id="container">
        <h1>Dice Roller</h1>
        <p id="rollCount">Rolls: 0</p>
        <label># of dice:</label>
        <input type="number" id="numOfDice" value="1" min="1">
        <button onclick="rollDice()">Roll Dice</button>
        <div id="diceResult"></div>
        <div id="diceImages"></div>

        <h2>Roll Statistics</h2>
        <canvas id="statsChart" width="400" height="200"></canvas>
    </div>

    <footer>
        <p> Dice Roller | Built by Moises Mendez</p>
    </footer>
    
    <script src="index.js"></script>

</body>
</html>
